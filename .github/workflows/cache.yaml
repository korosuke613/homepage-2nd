name: Cache

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  code-quality: write

concurrency:
  group: "cache"
  cancel-in-progress: true

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Cache node_modules of root
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'

      - name: Install dependencies of root
        id: npm-install
        run: |
          pnpm install --frozen-lockfile
          PLAYWRIGHT_VERSION=$(pnpm ls @playwright/test --json | jq -r '.[].devDependencies."@playwright/test".version')
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Chromatic
        uses: chromaui/action@1bbb5819252d9782cb7d77122d9becae467def18 # v16.10.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          exitOnceUploaded: true
          onlyChanged: true
          traceChanged: true
          debug: true

      - name: Cache playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.npm-install.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-

      - name: Install playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Cache astro build
        uses: actions/cache@v5
        with:
          path: .astro/cache
          key: astro-build-${{ github.sha }}
          restore-keys: astro-build-

      - name: Build
        run: pnpm run build

      - name: Cache Vitest
        uses: actions/cache@v5
        with:
          path: .cache/.vitest
          key: vitest-${{ github.sha }}
          restore-keys: vitest-
      
      - name: Vitest
        run: pnpm run test:unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
        if: always()

      - name: Upload unit coverage to GitHub
        uses: actions/upload-code-coverage@b51da2c3c1b23e04d2d6477cfc34350b1f5cd3e9 # v1.2.0
        with:
          file: coverage/unit/cobertura-coverage.xml
          language: TypeScript
          label: unit
          fail-on-error: false
        if: always()

      - name: Storybook testing
        run: pnpm run test:storybook

      - name: Upload storybook coverage to GitHub
        uses: actions/upload-code-coverage@b51da2c3c1b23e04d2d6477cfc34350b1f5cd3e9 # v1.2.0
        with:
          file: coverage/unit/cobertura-coverage.xml
          language: TypeScript
          label: storybook
          fail-on-error: false
        if: always()

      - name: Cache node_modules of tools
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'
          cache-dependency-path: 'tools/pnpm-lock.yaml'

      - name: Install dependencies of tools
        working-directory: tools
        run: |
          pnpm install --frozen-lockfile
